name: Tests and Coverage

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[aspect]"
          python -m pip install pytest pytest-cov nbmake freezegun virtualenv pygal pygaljs

      - name: Run tests with coverage
        run: |
          pytest --cov=pytest_benchmark --cov-report=xml --cov-report=term-missing -o addopts=""
              
      - name: Run prek
        run: |
          pip install prek
          prek run --all-files --show-diff-on-failure
        env:
          SKIP: taplo-lint
